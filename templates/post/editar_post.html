{% extends "base.html" %}

{% block title %}Editar publicación{% endblock %}

{% block content %}

<h2>Editar publicación</h2>

<form action="/editar_post/{{ post.id }}" method="POST">

    <textarea
        name="contenido"
        rows="5"
        required>{{ post.contenido }}</textarea>

    <br>

    <button type="submit">
        Guardar cambios
    </button>

    <a href="/">
        Cancelar
    </a>

</form>

{% endblock %}
